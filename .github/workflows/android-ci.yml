name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      # The keystore lives in the RELEASE_KEYSTORE_BASE64 secret (base64 of the
      # .jks). Absent secret (e.g. PRs from forks) => RELEASE_KEYSTORE_FILE stays
      # unset and the release build below is unsigned — still worth building so
      # R8/minification breakage is caught on every push, not just on tags.
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "RELEASE_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret available; release build will be unsigned."
          fi

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: best-radio-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Fail if tag build is unsigned
        if: startsWith(github.ref, 'refs/tags/v') && env.RELEASE_KEYSTORE_FILE == ''
        run: |
          echo "::error::RELEASE_KEYSTORE_* secrets are not configured; refusing to publish an unsigned APK."
          exit 1

      # Fixed asset names so the web download button and the Play Console upload
      # never need per-release URL changes.
      - name: Rename artifacts for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp app/build/outputs/apk/release/app-release.apk best-radio.apk
          cp app/build/outputs/bundle/release/app-release.aab best-radio.aab

      - name: Publish signed APK + AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            best-radio.apk
            best-radio.aab
          generate_release_notes: true
